version: '3.8'
services:
  node_app:
    container_name: express-node-app-container
    ports:
      - "4000:4000"
    env_file:
      - ./.env

    # depends_on is used to specify the dependencies between services. In this case, the node_app service depends on the mongo service, which means that the mongo service will be started before the node_app service.
    depends_on:
      # - postgres
      - mongo

    build:
    # you are building from where it goes to dockerfile
      context: .
      target: production
    environment:
      - NODE_ENV=production
    command: npm start



  redis:
    image: redis



  #we are using nginx as a reverse proxy to forward requests to the node_app service. The nginx service is configured to listen on port 8080 and forward requests to the node_app service on port 4000 also we used it to serve static files from the public directory of the node_app service and it helps in load balancing and caching of requests to the node_app service but for now we are just using it to forward requests to the node_app service but we can use it in the future to serve static files from the public directory of the node_app service and it helps in load balancing and caching of requests to the node_app service.
  Nginx:
    container_name: nginx-container
    image: nginx:stable-alpine
    ports:
      - "80:80"
    # we used depends_on to specify that the nginx service depends on the node_app service, which means that the node_app service will be started before the nginx service. This is important because the nginx service needs to forward requests to the node_app service, so it needs to be started after the node_app service is started.
    depends_on:
      - node_app
      #  to create the configuration file for the nginx service, we need to create a file named nginx.conf in the root directory of the project and add the following configuration to it. The configuration file is used to configure the nginx service to forward requests to the node_app service on port 4000 and serve static files from the public directory of the node_app service.

  # we did this volume cause we want to use the nginx.conf file that we created in the root directory of the project and we want to mount it to the /etc/nginx/conf.d/default.conf file in the nginx container. This way, we can use the configuration file that we created in the root directory of the project and we can also use the default configuration file that comes with the nginx image. The default configuration file is used to configure the nginx service to forward requests to the node_app service on port 4000 and serve static files from the public directory of the node_app service.
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
# =========================================================================================================================================================================
  mongo:
    container_name: mongo-container
    image: mongo
    restart: always
    volumes:
     - mongo-db:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
